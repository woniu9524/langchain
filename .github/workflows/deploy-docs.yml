name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - translate/Chinese  # 修改为您的中文翻译分支
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches:
      - translate/Chinese  # 修改为您的中文翻译分支
    paths:
      - 'docs/**'
  # 允许手动触发
  workflow_dispatch:

# 设置GitHub token权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过正在运行的部署队列
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # 托管环境变量
  NODE_OPTIONS: --max-old-space-size=5000

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史记录用于一些docusaurus功能

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
          cache-dependency-path: docs/yarn.lock

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          cd docs
          python -m venv .venv
          source .venv/bin/activate
          python -m uv pip install --pre -r vercel_requirements.txt
          python -m uv pip install --pre $(python scripts/partner_deps_list.py) --overrides vercel_overrides.txt

      - name: Install Node.js dependencies
        run: |
          cd docs
          yarn install --frozen-lockfile

      - name: Generate documentation files
        run: |
          cd docs
          source .venv/bin/activate
          make generate-files

      - name: Copy infrastructure files
        run: |
          cd docs
          make copy-infra

      - name: Render notebooks and process markdown
        run: |
          cd docs
          source .venv/bin/activate
          make render
          make md-sync
          make append-related

      - name: Generate API references
        run: |
          cd docs
          source .venv/bin/activate
          make generate-references

      - name: Prepare docs for build
        run: |
          cd docs
          rm -rf docs
          mv build/output-new/docs docs
          cp -r ../libs/cli/langchain_cli/integration_template src/theme
          rm -rf build
          mkdir -p static/api_reference

      - name: Clone API docs
        run: |
          cd docs
          git clone --depth=1 https://github.com/langchain-ai/langchain-api-docs-html.git
          if [ -d "langchain-api-docs-html/api_reference_build/html" ]; then
            mv langchain-api-docs-html/api_reference_build/html/* static/api_reference/
          fi
          rm -rf langchain-api-docs-html

      - name: Build Docusaurus
        run: |
          cd docs
          NODE_ENV=production yarn run docusaurus build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/translate/Chinese'  # 修改为您的中文翻译分支
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 